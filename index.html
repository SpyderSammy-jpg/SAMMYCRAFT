<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SammyCraft Hosting</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

/* HEADER */
header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  background: #2c3e50;
  color: white;
  padding: 15px;
  font-size: 20px;
  z-index: 1000;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
header span {
  font-size: 14px;
  opacity: 0.8;
}

/* MAIN */
main {
  margin-top: 90px;
  padding: 20px;
}

/* BUTTONS */
button {
  padding: 12px 20px;
  background: #3498db;
  border: none;
  color: white;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
}
button:disabled {
  background: #777;
  cursor: not-allowed;
}

/* INPUTS */
input, select {
  padding: 10px;
  width: 100%;
  margin-top: 10px;
  margin-bottom: 20px;
  font-size: 16px;
}

/* EAGLER SERVER LIST BOX */
.eagler-box {
  background: #1e1e1e;
  border: 1px solid #444;
  padding: 15px;
  border-radius: 6px;
  color: white;
  position: relative;
  box-shadow: inset 0 0 8px #000;
}
.eagler-title {
  color: #f1c40f;
  font-size: 20px;
  font-weight: bold;
}
.eagler-line1 {
  color: white;
}
.eagler-line2 {
  color: #aaa;
  font-size: 14px;
}
.ping-bars {
  position: absolute;
  right: 10px;
  top: 15px;
  width: 20px;
  height: 20px;
  background: url('https://raw.githubusercontent.com/lax1dude/eaglercraft-resources/main/icons/ping_full.png');
  background-size: cover;
}
</style>
</head>

<body>

<header>
  <div>
    <strong>SpyderSammy</strong> — Eaglercraft Hosting<br>
    <span>Multiplayer 1.12.2</span>
  </div>
</header>

<main id="app">
  <h2>No servers yet</h2>
  <button onclick="startCreate()">Create Server</button>
</main>

<script>
const API = "https://nodejs-production-10084.up.railway.app";

/* STEP 1 — NAME */
function startCreate() {
  document.body.style.background = "#f5f5f5";
  document.getElementById("app").innerHTML = `
    <h2>Create your own Eaglercraft 1.12.2 Multiplayer server!</h2>
    <h3>Step 1 — Name your server</h3>

    <p>wss://<strong id="previewName">yourname</strong>.sammy.host</p>

    <input id="serverName" placeholder="server-name" oninput="validateName()">

    <button id="next1" onclick="step2()" disabled>Next</button>
  `;
}

function validateName() {
  let name = document.getElementById("serverName").value;
  name = name.toLowerCase().replace(/[^a-z\-]/g, "");
  document.getElementById("serverName").value = name;
  document.getElementById("previewName").innerText = name || "yourname";
  document.getElementById("next1").disabled = name.length < 3;
}

/* STEP 2 — VERSION */
function step2() {
  document.body.style.background = "black";

  document.getElementById("app").innerHTML = `
    <h3 style="color:white;">Step 2 — Version</h3>

    <button disabled style="width:100%;padding:15px;background:#333;color:#777;border:2px solid #555;">
      1.8.8 (coming soon)
    </button><br><br>

    <button id="v1122" onclick="enableNext()" 
      style="width:100%;padding:15px;background:#e74c3c;color:white;border:2px solid yellow;font-weight:bold;">
      1.12.2 (Paper/Spigot)
    </button><br><br>

    <button disabled style="width:100%;padding:15px;background:#333;color:#777;border:2px solid #555;">
      1.22.10 (coming soon)
    </button><br><br>

    <button id="next2" onclick="step3()" disabled
      style="width:100%;padding:15px;background:#f1c40f;color:black;border:2px solid white;font-size:18px;">
      Next
    </button>
  `;
}

function enableNext() {
  document.getElementById("next2").disabled = false;
}

/* STEP 3 — CUSTOMIZE */
function step3() {
  const name = document.getElementById("serverName").value;

  document.body.style.background = "black";

  document.getElementById("app").innerHTML = `
    <h3 style="color:white;">Step 3 — Customize Your Server</h3>

    <div class="eagler-box">
      <div class="eagler-title">${name}.sammy.host</div>
      <div id="motdTitle" class="eagler-line1">Welcome to your server!</div>
      <div id="motdFooter" class="eagler-line2">Hosted on SammyCraft</div>
      <div class="ping-bars"></div>
    </div>

    <label style="color:white;">MOTD Title:</label>
    <input id="titleInput" value="Welcome to your server!" oninput="updateMOTD()">

    <label style="color:white;">MOTD Footer:</label>
    <input id="footerInput" value="Hosted on SammyCraft" oninput="updateMOTD()">

    <button onclick="finishCreate()" 
      style="width:100%;padding:15px;background:#e74c3c;color:white;border:2px solid yellow;font-size:18px;">
      Start Server
    </button>
  `;
}

function updateMOTD() {
  document.getElementById("motdTitle").innerText = document.getElementById("titleInput").value;
  document.getElementById("motdFooter").innerText = document.getElementById("footerInput").value;
}

/* CREATE SERVER */
async function finishCreate() {
  const name = document.getElementById("serverName").value;

  const res = await fetch(API + "/servers/create", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      name,
      version: "1.12.2",
      motdTitle: document.getElementById("titleInput").value,
      motdFooter: document.getElementById("footerInput").value,
      motdTheme: "default"
    })
  });

  const data = await res.json();
  loadDashboard(data.id);
}

/* DASHBOARD */
async function loadDashboard(id) {
  const res = await fetch(API + "/servers");
  const list = await res.json();
  const server = list.find(s => s.id === id);

  document.body.style.background = "#f5f5f5";

  document.getElementById("app").innerHTML = `
    <h2>Server Dashboard</h2>

    <div class="eagler-box">
      <div class="eagler-title">${server.name}.sammy.host</div>
      <div>Status: <strong>${server.status}</strong></div>
    </div><br>

    <button onclick="startServer('${id}')">Start</button>
    <button onclick="stopServer('${id}')">Stop</button>
    <button onclick="restartServer('${id}')">Restart</button><br><br>

    <h3>Console</h3>
    <div id="consoleBox" style="background:white;padding:10px;height:200px;overflow:auto;border:1px solid #ccc;"></div>

    <input id="cmd" placeholder="/say hello">
    <button onclick="sendCmd('${id}')">Send</button>
  `;
}

/* START / STOP / RESTART */
async function startServer(id) {
  await fetch(API + `/servers/${id}/start`, { method: "POST" });
  loadDashboard(id);
}
async function stopServer(id) {
  await fetch(API + `/servers/${id}/stop`, { method: "POST" });
  loadDashboard(id);
}
async function restartServer(id) {
  await stopServer(id);
  setTimeout(() => startServer(id), 500);
}

/* SEND COMMAND */
async function sendCmd(id) {
  const cmd = document.getElementById("cmd").value;
  await fetch(API + `/servers/${id}/command`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ command: cmd })
  });
  document.getElementById("cmd").value = "";
}
</script>

</body>
</html>
