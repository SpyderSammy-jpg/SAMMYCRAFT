<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Home - Classroom</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

/* HEADER */
header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  background: #2c3e50;
  color: white;
  padding: 15px;
  font-size: 20px;
  z-index: 1000;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
header span {
  font-size: 14px;
  opacity: 0.8;
}

/* MAIN CONTENT */
main {
  margin-top: 90px;
  padding: 20px;
}

/* BUTTONS */
button {
  padding: 12px 20px;
  background: #3498db;
  border: none;
  color: white;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
}
button:disabled {
  background: #95a5a6;
  cursor: not-allowed;
}

/* SERVER BOX */
.server-box {
  background: white;
  padding: 20px;
  border-radius: 8px;
  margin-bottom: 15px;
  border: 1px solid #ccc;
}

/* INPUTS */
input, select {
  padding: 10px;
  width: 100%;
  margin-top: 10px;
  margin-bottom: 20px;
  font-size: 16px;
}
</style>
</head>
<body>

<header>
  <div>
    <strong>SpyderSammy</strong> — Eaglercraft Hosting<br>
    <span>Multiplayer 1.12.2</span>
  </div>
</header>

<main id="app">
  <h2>No servers yet</h2>
  <button onclick="startCreate()">Create Server</button>
</main>

<script>
const API = "https://nodejs-production-1004.up.railway.app";

/* STEP 1 — START CREATE */
function startCreate() {
  document.getElementById("app").innerHTML = `
    <h2>Create your own Eaglercraft 1.12.2 Multiplayer server!</h2>
    <h3>Step 1 — Name your server</h3>
    <p>This will be used in your wss:// address.</p>
    <p>wss://<strong id="previewName">yourname</strong>.sammy.host</p>

    <input id="serverName" placeholder="server-name" oninput="validateName()">

    <button id="next1" onclick="step2()" disabled>Next</button>
  `;
}

function validateName() {
  let name = document.getElementById("serverName").value;
  name = name.toLowerCase().replace(/[^a-z\-]/g, "");
  document.getElementById("serverName").value = name;
  document.getElementById("previewName").innerText = name || "yourname";
  document.getElementById("next1").disabled = name.length < 3;
}

/* STEP 2 — VERSION */
function step2() {
  document.getElementById("app").innerHTML = `
    <h3>Step 2 — Version</h3>

    <button disabled>1.8.8 (coming soon)</button><br><br>
    <button style="background:#27ae60" onclick="step3()">1.12.2 (Paper/Spigot)</button><br><br>
    <button disabled>1.22.10 (coming soon)</button>
  `;
}

/* STEP 3 — CUSTOMIZATION */
function step3() {
  const name = document.getElementById("serverName").value;

  document.getElementById("app").innerHTML = `
    <h3>Step 3 — Customize</h3>
    <p>Your server will appear like this in Eaglercraft:</p>

    <div class="server-box">
      <strong>${name}.sammy.host</strong><br>
      <em>Custom MOTD preview here</em>
    </div>

    <button onclick="finishCreate()">Start Server</button>
  `;
}

/* FINAL — CREATE SERVER */
async function finishCreate() {
  const name = document.getElementById("serverName").value;

  const res = await fetch(API + "/servers/create", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      name,
      version: "1.12.2",
      motdTitle: "Welcome!",
      motdFooter: "Hosted on SammyCraft",
      motdTheme: "default"
    })
  });

  const data = await res.json();
  loadDashboard(data.id);
}

/* DASHBOARD */
async function loadDashboard(id) {
  const res = await fetch(API + "/servers");
  const list = await res.json();
  const server = list.find(s => s.id === id);

  document.getElementById("app").innerHTML = `
    <h2>Server Dashboard</h2>

    <div class="server-box">
      <strong>${server.name}.sammy.host</strong><br>
      Status: <strong>${server.status}</strong>
    </div>

    <button onclick="startServer('${id}')">Start</button>
    <button onclick="stopServer('${id}')">Stop</button>
    <button onclick="restartServer('${id}')">Restart</button>

    <h3>Console</h3>
    <div id="consoleBox" style="background:white;padding:10px;height:200px;overflow:auto;border:1px solid #ccc;"></div>

    <input id="cmd" placeholder="/say hello">
    <button onclick="sendCmd('${id}')">Send</button>
  `;
}

/* START / STOP / RESTART */
async function startServer(id) {
  await fetch(API + `/servers/${id}/start`, { method: "POST" });
  loadDashboard(id);
}
async function stopServer(id) {
  await fetch(API + `/servers/${id}/stop`, { method: "POST" });
  loadDashboard(id);
}
async function restartServer(id) {
  await stopServer(id);
  setTimeout(() => startServer(id), 500);
}

/* SEND COMMAND */
async function sendCmd(id) {
  const cmd = document.getElementById("cmd").value;
  await fetch(API + `/servers/${id}/command`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ command: cmd })
  });
  document.getElementById("cmd").value = "";
}
</script>

</body>
</html>
